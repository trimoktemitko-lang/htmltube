<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMLTube | Welcome</title>
    <style>
        /* Simple styling to make the site look clean */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #ff0000; /* YouTube Red color */
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1em;
            color: #666;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .button:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HTMLTube</h1>
        <p>Your custom domain is now working perfectly on GitHub Pages!</p>
        <p>Edit this file to build your new website.</p>
        <a href="#" class="button">Get Started</a>
    </div>

</body>
</html>
